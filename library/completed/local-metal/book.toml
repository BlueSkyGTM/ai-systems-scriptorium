# mdBook config тАФ Local Metal course
# Build: `mdbook serve` (live) / `mdbook build` (static). Install: `cargo install mdbook`.
# mdbook binary: ~/.tools/mdbook/mdbook.exe

[book]
title = "Local Metal тАФ Build and Network Your Own AI Inference Server"
authors = ["Raymond Fenton"]
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = ""
additional-js = ["theme/copy-to-claude.js"]
additional-css = ["theme/copy-to-claude.css", "theme/syntax-polish.css", "theme/readability.css"]
